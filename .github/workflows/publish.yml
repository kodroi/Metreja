name: Publish to NuGet

on:
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest

    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.3.3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3

      - name: Display version
        run: echo "Publishing version ${{ steps.gitversion.outputs.semVer }}"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build Metreja.Tool
        run: dotnet build src/Metreja.Tool/Metreja.Tool.csproj -c Release --no-restore

      - name: Build Metreja.Profiler (C++ DLL)
        run: msbuild src/Metreja.Profiler/Metreja.Profiler.vcxproj /p:Configuration=Release /p:Platform=x64 "/p:SolutionDir=${{ github.workspace }}/"

      - name: Build Metreja.TestApp
        run: dotnet build test/Metreja.TestApp/Metreja.TestApp.csproj -c Release --no-restore

      - name: Run integration tests
        run: dotnet test test/Metreja.IntegrationTests/Metreja.IntegrationTests.csproj -c Release --no-restore --verbosity normal

      - name: Pack NuGet package
        run: dotnet pack src/Metreja.Tool/Metreja.Tool.csproj -c Release --no-build -o artifacts /p:PackageVersion=${{ steps.gitversion.outputs.semVer }}

      - name: Push to NuGet.org
        shell: bash
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.gitversion.outputs.semVer }}" artifacts/*.nupkg --title "v${{ steps.gitversion.outputs.semVer }}" --generate-notes
